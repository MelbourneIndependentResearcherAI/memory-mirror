name: Deploy Little Ones AI to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'little-ones-ai/**'
      - '.github/workflows/deploy-little-ones-ai.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: little-ones-ai/package.json

      - name: Install dependencies
        working-directory: little-ones-ai
        run: npm ci

      - name: Build application
        working-directory: little-ones-ai
        run: npm run build

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.LITTLE_ONES_AI_APP_NAME }}
          publish-profile: ${{ secrets.LITTLE_ONES_AI_PUBLISH_PROFILE }}
          package: little-ones-ai/dist
