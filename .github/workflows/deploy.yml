name: Deploy Memory Mirror to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'memory-mirror/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: memory-mirror/package.json

      - name: Install dependencies
        working-directory: memory-mirror
        run: npm ci

      - name: Build application
        working-directory: memory-mirror
        run: npm run build

      - name: Check deployment credentials
        id: check-creds
        run: |
          if [ -n "$PUBLISH_PROFILE" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        env:
          PUBLISH_PROFILE: ${{ secrets.MEMORY_MIRROR_PUBLISH_PROFILE }}

      - name: Deploy to Azure App Service
        if: steps.check-creds.outputs.available == 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.MEMORY_MIRROR_APP_NAME }}
          publish-profile: ${{ secrets.MEMORY_MIRROR_PUBLISH_PROFILE }}
          package: memory-mirror/dist
