name: Deploy Memory Mirror

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean, Install, and Build
        run: |
          # Go to the project directory
          cd memory-mirror
          # Force remove any old build artifacts
          rm -rf dist
          # Clean install of dependencies
          npm install
          # Generate fresh build
          npm run build

      - name: Deploy to Azure
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MEMORY_MIRROR }}
          action: "upload"
          # Ensure this points to the exact folder
          app_location: "/memory-mirror"
          output_location: "dist"
