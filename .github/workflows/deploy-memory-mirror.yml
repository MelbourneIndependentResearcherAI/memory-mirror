      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MEMORY_MIRROR }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "memory-mirror"    # Folder where package.json lives
          output_location: "dist"         # Folder where npm run build puts its files
          skip_app_build: true            # We built it in the previous step
