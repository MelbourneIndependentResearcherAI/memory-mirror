name: Deploy Memory Mirror to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'memory-mirror/**'
      - '.github/workflows/deploy-memory-mirror.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: memory-mirror/package.json

      - name: Install dependencies
        working-directory: memory-mirror
        run: npm ci

      - name: Build application
        working-directory: memory-mirror
        run: npm run build

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.MEMORY_MIRROR_APP_NAME }}
          publish-profile: ${{ secrets.MEMORY_MIRROR_PUBLISH_PROFILE }}
          package: memory-mirror/dist
