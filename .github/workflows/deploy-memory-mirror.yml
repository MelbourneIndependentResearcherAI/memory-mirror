      - name: Deploy to Azure
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MEMORY_MIRROR }}
          action: "upload"
          # This tells Azure to go inside the folder where your package.json lives
          app_location: "/memory-mirror" 
          # This tells Azure where your compiled website files are
          output_location: "dist" 
          skip_app_build: true
